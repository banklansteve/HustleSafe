<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 74" role="img" aria-label="HustleSafe">
  <defs>
    <linearGradient id="dL" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="dR" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="dC" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <filter id="fGlow" x="-10%" y="-30%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g transform="translate(0,5)" filter="url(#fGlow)">
    <rect x="0" y="22" width="15" height="42" rx="7.5" fill="url(#dL)"/>
    <rect x="42" y="0" width="15" height="64" rx="7.5" fill="url(#dR)"/>
    <rect x="15" y="30" width="27" height="12" rx="6" fill="url(#dC)"/>
    <circle cx="15" cy="36" r="6.5" fill="#0d9488"/>
    <circle cx="15" cy="36" r="3" fill="#ccfbf1"/>
    <circle cx="42" cy="36" r="6.5" fill="#5eead4"/>
    <circle cx="42" cy="36" r="3" fill="#f0fdfa"/>
  </g>
  <text font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="52" font-weight="800" fill="#f0fdfa" letter-spacing="-2" x="57" y="55">ustle</text>
  <text font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="52" font-weight="200" fill="#14b8a6" letter-spacing="-1.5" x="185" y="55">Safe</text>
  <text font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="500" fill="#5eead4" letter-spacing="8.8" x="60" y="69" opacity="0.85">Hire.Trust.Secure</text>
</svg>
