<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <!--
    HUSTLESAFE V7b — Corrected
    ════════════════════════════════════════════════════
    MARK GEOMETRY (H=64px, wider arms):
      Right arm: x=42, y=0,  w=15, h=64, rx=7.5
      Left arm:  x=0,  y=22, w=15, h=42, rx=7.5
      Crossbar:  x=15, y=30, w=27, h=12, rx=6
      Nodes:     cx=15,cy=36 and cx=42,cy=36, r=6.5, inner r=3
      Total mark width = 57px, height = 64px

    VERSION B LAYOUT:
      Mark left x  = 762
      y_mark_top   = 193  (mark centre = 225 = cell centre ✓)
      Text starts at x = 762+57 = 819
      Main baseline    = 193+50 = 243
      Tagline baseline = 193+63 = 256  (foot of mark = 257, ≈same)
      Tagline x        = 822   (optical = 822+0.8 = 822.8 ≈ "u" optical left)
      Tagline ls       = 8.8   (optical width ≈ 231px ≈ "ustleSafe" optical width)
    ════════════════════════════════════════════════════
  -->
  <defs>
    <linearGradient id="vL" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="vR" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="vC" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="50%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="dL" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="dR" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="dC" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="bgDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050e0e"/>
      <stop offset="100%" stop-color="#081918"/>
    </linearGradient>
    <filter id="fShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="6" flood-color="#0d9488" flood-opacity="0.18"/>
    </filter>
    <filter id="fGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Backgrounds -->
  <rect width="1400" height="900" fill="#f0fdfa"/>
  <rect y="450" width="1400" height="450" fill="url(#bgDark)"/>
  <line x1="700" y1="0" x2="700" y2="900" stroke="#c4e8e3" stroke-width="0.6" stroke-dasharray="5 5"/>
  <line x1="0" y1="450" x2="1400" y2="450" stroke="#0e2828" stroke-width="0.8"/>

  <!-- Labels -->
  <text x="24" y="19" font-family="Helvetica Neue,Arial,sans-serif" font-size="8.5" fill="#64748b" letter-spacing="2.5" font-weight="600">VERSION A — ICON ONLY · LIGHT</text>
  <text x="724" y="19" font-family="Helvetica Neue,Arial,sans-serif" font-size="8.5" fill="#64748b" letter-spacing="2.5" font-weight="600">VERSION B — FULL LOCKUP · LIGHT</text>
  <text x="24" y="469" font-family="Helvetica Neue,Arial,sans-serif" font-size="8.5" fill="#5eead4" letter-spacing="2.5" font-weight="600" opacity="0.55">VERSION A — ICON ONLY · DARK</text>
  <text x="724" y="469" font-family="Helvetica Neue,Arial,sans-serif" font-size="8.5" fill="#5eead4" letter-spacing="2.5" font-weight="600" opacity="0.55">VERSION B — FULL LOCKUP · DARK</text>

  <!-- ═══════════════════════════════════════════
       VERSION A LIGHT — icon only, large
       Cell centre: (350, 225)
       Mark 64×64 at scale 3.5 → 224×224
       Translate: (350-112, 225-112) = (238, 113)
  ═══════════════════════════════════════════ -->
  <g transform="translate(238,113) scale(3.5)" filter="url(#fShadow)">
    <rect x="0"  y="22" width="15" height="42" rx="7.5" fill="url(#vL)"/>
    <rect x="42" y="0"  width="15" height="64" rx="7.5" fill="url(#vR)"/>
    <rect x="15" y="30" width="27" height="12" rx="6"   fill="url(#vC)"/>
    <circle cx="15" cy="36" r="6.5" fill="#0f766e"/>
    <circle cx="15" cy="36" r="3"   fill="#ccfbf1"/>
    <circle cx="42" cy="36" r="6.5" fill="#0d9488"/>
    <circle cx="42" cy="36" r="3"   fill="#f0fdfa"/>
  </g>

  <!-- ═══════════════════════════════════════════
       VERSION B LIGHT — full lockup
       Mark left=762, y_mark=193
       Text baseline=243, Tagline baseline=256
       Text x=819, Tagline x=822
  ═══════════════════════════════════════════ -->
  <g transform="translate(762,193)" filter="url(#fShadow)">
    <rect x="0"  y="22" width="15" height="42" rx="7.5" fill="url(#vL)"/>
    <rect x="42" y="0"  width="15" height="64" rx="7.5" fill="url(#vR)"/>
    <rect x="15" y="30" width="27" height="12" rx="6"   fill="url(#vC)"/>
    <circle cx="15" cy="36" r="6.5" fill="#0f766e"/>
    <circle cx="15" cy="36" r="3"   fill="#ccfbf1"/>
    <circle cx="42" cy="36" r="6.5" fill="#0d9488"/>
    <circle cx="42" cy="36" r="3"   fill="#f0fdfa"/>
  </g>
  <!-- ustleSafe — one word, no space, no gap after mark -->
  <text font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="52" font-weight="800" fill="#0f172a" letter-spacing="-2" x="819" y="243">ustle</text>
  <text font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="52" font-weight="200" fill="#0d9488" letter-spacing="-1.5" x="947" y="243">Safe</text>
  <!-- Tagline: x=822 (optical aligns with "u"), ls=8.8 (spans full "ustleSafe" width) -->
  <text font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="500" fill="#94a3b8" letter-spacing="8.8" x="822" y="257">Hire.Trust.Secure</text>

  <!-- ═══════════════════════════════════════════
       VERSION A DARK — y offset +450 → translate(238, 563)
  ═══════════════════════════════════════════ -->
  <g transform="translate(238,563) scale(3.5)" filter="url(#fGlow)">
    <rect x="0"  y="22" width="15" height="42" rx="7.5" fill="url(#dL)"/>
    <rect x="42" y="0"  width="15" height="64" rx="7.5" fill="url(#dR)"/>
    <rect x="15" y="30" width="27" height="12" rx="6"   fill="url(#dC)"/>
    <circle cx="15" cy="36" r="13" fill="#0d9488" opacity="0.18"/>
    <circle cx="15" cy="36" r="6.5" fill="#0d9488"/>
    <circle cx="15" cy="36" r="3"   fill="#ccfbf1"/>
    <circle cx="42" cy="36" r="13" fill="#14b8a6" opacity="0.15"/>
    <circle cx="42" cy="36" r="6.5" fill="#5eead4"/>
    <circle cx="42" cy="36" r="3"   fill="#f0fdfa"/>
  </g>

  <!-- ═══════════════════════════════════════════
       VERSION B DARK — y_mark = 193+450 = 643
       main baseline = 643+50 = 693
       tagline baseline = 643+63 = 706
  ═══════════════════════════════════════════ -->
  <g transform="translate(762,643)" filter="url(#fGlow)">
    <rect x="0"  y="22" width="15" height="42" rx="7.5" fill="url(#dL)"/>
    <rect x="42" y="0"  width="15" height="64" rx="7.5" fill="url(#dR)"/>
    <rect x="15" y="30" width="27" height="12" rx="6"   fill="url(#dC)"/>
    <circle cx="15" cy="36" r="13" fill="#0d9488" opacity="0.18"/>
    <circle cx="15" cy="36" r="6.5" fill="#0d9488"/>
    <circle cx="15" cy="36" r="3"   fill="#ccfbf1"/>
    <circle cx="42" cy="36" r="13" fill="#14b8a6" opacity="0.15"/>
    <circle cx="42" cy="36" r="6.5" fill="#5eead4"/>
    <circle cx="42" cy="36" r="3"   fill="#f0fdfa"/>
  </g>
  <text font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="52" font-weight="800" fill="#f0fdfa" letter-spacing="-2" x="819" y="693">ustle</text>
  <text font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="52" font-weight="200" fill="#14b8a6" letter-spacing="-1.5" x="947" y="693">Safe</text>
  <text font-family="Helvetica Neue,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="500" fill="#5eead4" letter-spacing="8.8" x="822" y="707" opacity="0.75">Hire.Trust.Secure</text>

</svg>
